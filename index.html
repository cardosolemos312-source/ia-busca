<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Heythan AI</title>

<!-- Fonte estilo ChatGPT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Inter", Arial, sans-serif;
  background: #0b0f19;
  color: white;
  display: flex;
  height: 100vh;
  font-size: 16px;
}

/* SIDEBAR */
#sidebar {
  width: 260px;
  background: #0a0f1c;
  padding: 12px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1f2937;
}

.menu {
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
  cursor: pointer;
  background: #111827;
  font-size: 14px;
}

.menu:hover {
  background: #2563eb;
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
#topbar {
  padding: 12px;
  background: #0a0f1c;
  font-size: 14px;
  color: #94a3b8;
  border-bottom: 1px solid #1f2937;
}

/* CHAT AREA */
#chat {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BOLHAS STYLE (WhatsApp) */
.user, .ia {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.4;
  word-wrap: break-word;
}

/* USER (direita) */
.user {
  background: #2563eb;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

/* IA (esquerda) */
.ia {
  background: #1f2937;
  color: #e5e7eb;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

/* INPUT AREA FIXO */
#inputArea {
  display: flex;
  padding: 6px;
  background: #0a0f1c;
  border-top: 1px solid #1f2937;
  position: sticky;
  bottom: 0;
  gap: 8px;
  align-items: center;
}

/* INPUT MENOR E LIMPO */
input {
  flex: 1;
  height: 42px;
  padding: 0 12px;
  border: 1px solid #1f2937;
  border-radius: 10px;
  background: #111827;
  color: white;
  font-size: 15px;
  outline: none;
}

/* BOTÃO GRANDE E BONITO */
button {
  height: 42px;
  padding: 0 16px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: #1d4ed8;
}

/* 🔥 MOBILE CHATGPT STYLE */
@media (max-width: 100px) {

  body {
    flex-direction: column;
  }

  #sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
    white-space: nowrap;
  }

  #chat {
    padding: 10px;
    height: calc(100vh - 120px);
  }

  .user, .ia {
    max-width: 90%;
    font-size: 16px;
  }

  input {
    font-size: 16px;
  }

  button {
    font-size: 14px;
  }

  #inputArea {
    padding: 6px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="menu">➕ Novo Chat</div>
  <div class="menu">🔎 Pesquisar</div>
  <div class="menu">📚 Biblioteca</div>
  <div class="menu">📁 ProjectoA</div>
  <div class="menu">📱 Apps</div>
  <div class="menu">🎓 CENFOTEP</div>
  <div class="menu">⋯ Mais</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="topbar">
Heythan AI • Desenvolvido pelo Cardoso Lemos
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escreve a tua pergunta..." />
  <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

async function enviar() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const pergunta = input.value.trim();
  if (!pergunta) return;

  chat.innerHTML += `<div class="user">👤 Tu: ${pergunta}</div>`;
  input.value = "";

  let respostaIA = "";

  // 🔥 RESPOSTA FIXA PARA "QUEM CRIOU"
  if (pergunta.toLowerCase().includes("quem criou")) {
    respostaIA = "🤖 Eu fui criado por Cardoso Lemos, desenvolvedor Web. Ele é o responsável pelo desenvolvimento deste sistema de IA.";
  } else {
    try {
      const res = await fetch("http://127.0.0.1:3000/perguntar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta })
      });

      const data = await res.json();
      respostaIA = data.resposta;

    } catch (err) {
      respostaIA = "Erro ao conectar na IA";
    }
  }

  chat.innerHTML += `<div class="ia">🤖 IA: ${respostaIA}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
