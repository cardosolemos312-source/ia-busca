<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heythan AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
#sidebar {
  width: 240px;
  background: #0a0f1c;
  padding: 10px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1f2937;
}

.menu {
  padding: 10px;
  margin: 4px 0;
  border-radius: 8px;
  cursor: pointer;
  background: #111827;
  transition: 0.2s;
  font-size: 14px;
}

.menu:hover {
  background: #2563eb;
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* TOP */
#topbar {
  padding: 10px;
  background: #0a0f1c;
  font-size: 12px;
  color: #94a3b8;
  border-bottom: 1px solid #1f2937;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.user {
  color: #60a5fa;
  margin: 6px 0;
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.ia {
  color: #e5e7eb;
  margin: 6px 0;
  background: #0f172a;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #0a0f1c;
  border-top: 1px solid #1f2937;
  gap: 8px;
}

input {
  flex: 1;
  padding: 12px;
  border: 1px solid #1f2937;
  border-radius: 10px;
  background: #111827;
  color: white;
  outline: none;
  font-size: 14px;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  font-size: 14px;
  min-width: 90px;
}

button:hover {
  background: #1d4ed8;
}

/* RESPONSIVO (TELEMÓVEL) */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }

  #sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
    border-right: none;
    border-bottom: 1px solid #1f2937;
  }

  .menu {
    flex: 0 0 auto;
    white-space: nowrap;
  }

  #chat {
    padding: 10px;
  }

  .user, .ia {
    max-width: 100%;
  }

  button {
    min-width: 70px;
  }
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="menu">➕ Novo Chat</div>
  <div class="menu">🔎 Pesquisar</div>
  <div class="menu">📚 Biblioteca</div>
  <div class="menu">📁 ProjectoA</div>
  <div class="menu">📱 Apps</div>
  <div class="menu">🎓 CENFOTEP</div>
  <div class="menu">⋯ Mais</div>
</div>

<div id="main">

  <div id="topbar">
    Heythan AI • Interface estilo ChatGPT
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escreve a tua pergunta..." />
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script>
async function enviar() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const pergunta = input.value.trim();
  if (!pergunta) return;

  chat.innerHTML += `<div class="user">👤 Tu: ${pergunta}</div>`;
  input.value = "";

  let respostaIA = "";

  if (pergunta.toLowerCase().includes("quem criou")) {
    respostaIA = "🤖 Fui criado por Cardoso Lemos, desenvolvedor Web.";
  } else {
    try {
      const res = await fetch("http://127.0.0.1:3000/perguntar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta })
      });

      const data = await res.json();
      respostaIA = data.resposta;
    } catch (err) {
      respostaIA = "Erro ao conectar na IA";
    }
  }

  chat.innerHTML += `<div class="ia">🤖 IA: ${respostaIA}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
