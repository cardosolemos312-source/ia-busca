<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Heythan AI</title>

<!-- Fonte estilo ChatGPT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Inter", Arial, sans-serif;
  background: #0b0f19;
  color: white;
  display: flex;
  height: 100vh;
  font-size: 16px;
}

/* SIDEBAR */
#sidebar {
  width: 260px;
  background: #0a0f1c;
  padding: 12px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1f2937;
}

.menu {
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
  cursor: pointer;
  background: #111827;
  font-size: 14px;
}

.menu:hover {
  background: #2563eb;
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
#topbar {
  padding: 12px;
  background: #0a0f1c;
  font-size: 14px;
  color: #94a3b8;
  border-bottom: 1px solid #1f2937;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  font-size: 16px;
}

.user {
  color: #60a5fa;
  margin: 10px 0;
  font-size: 16px;
}

.ia {
  color: #e5e7eb;
  margin: 10px 0;
  font-size: 16px;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 12px;
  background: #0a0f1c;
  border-top: 1px solid #1f2937;
}

input {
  flex: 1;
  padding: 14px;
  border: 1px solid #1f2937;
  border-radius: 10px;
  background: #111827;
  color: white;
  font-size: 16px;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 16px;
}

/* 🔥 MOBILE RESPONSIVO TIPO CHATGPT */
@media (max-width: 768px) {

  body {
    flex-direction: column;
    font-size: 18px;
  }

  #sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
    white-space: nowrap;
    border-right: none;
    border-bottom: 1px solid #1f2937;
  }

  .menu {
    font-size: 13px;
    flex: 1;
    text-align: center;
  }

  #chat {
    padding: 14px;
    font-size: 18px;
  }

  .user, .ia {
    font-size: 18px;
    line-height: 1.5;
  }

  #inputArea {
    position: sticky;
    bottom: 0;
  }

  input {
    font-size: 18px;
  }

  button {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="menu">➕ Novo Chat</div>
  <div class="menu">🔎 Pesquisar</div>
  <div class="menu">📚 Biblioteca</div>
  <div class="menu">📁 ProjectoA</div>
  <div class="menu">📱 Apps</div>
  <div class="menu">🎓 CENFOTEP</div>
  <div class="menu">⋯ Mais</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="topbar">
Heythan AI • Desenvolvido pelo Cardoso Lemos
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escreve a tua pergunta..." />
  <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

async function enviar() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const pergunta = input.value.trim();
  if (!pergunta) return;

  chat.innerHTML += `<div class="user">👤 Tu: ${pergunta}</div>`;
  input.value = "";

  let respostaIA = "";

  // 🔥 RESPOSTA FIXA PARA "QUEM CRIOU"
  if (pergunta.toLowerCase().includes("quem criou")) {
    respostaIA = "🤖 Eu fui criado por Cardoso Lemos, desenvolvedor Web. Ele é o responsável pelo desenvolvimento deste sistema de IA.";
  } else {
    try {
      const res = await fetch("http://127.0.0.1:3000/perguntar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta })
      });

      const data = await res.json();
      respostaIA = data.resposta;

    } catch (err) {
      respostaIA = "Erro ao conectar na IA";
    }
  }

  chat.innerHTML += `<div class="ia">🤖 IA: ${respostaIA}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
